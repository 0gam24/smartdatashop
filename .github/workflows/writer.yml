# 에이전트 #3 — Pulse Writer
# Editor-in-Chief가 daily-queue/ 에 신규 큐를 푸시하면 트리거되어 초안 MDX 생성 → PR
name: agent-writer

on:
  # 다중 안전망 — GitHub cron 부정확성·skip 위험 대응:
  #
  # 1. workflow_run — fetch-data 완료 후 자동 가동 (가장 안정).
  #    GITHUB_TOKEN 한계 회피: workflow_run 은 같은 repo workflow 의 완료 이벤트를
  #    수신할 수 있어 fetch-data → writer 체이닝이 보안 정책 우회 가능.
  workflow_run:
    workflows: ['fetch-data']
    types: [completed]
  # 2. push 트리거 — 운영자 직접 push 케이스 (PR 머지 시 daily-queue/** 변경 시).
  push:
    paths:
      - 'daily-queue/**'
  # 3. 백업 cron — workflow_run 누락 대비 1일 2회 (03:45 + 09:00 KST).
  schedule:
    - cron: '45 18 * * *'  # KST 03:45 (fetch-data 02:17 후 1.5h)
    - cron: '0 0 * * *'    # KST 09:00 (운영자 아침 점검 직전)
  # 4. 수동 — workflow_dispatch
  workflow_dispatch:

concurrency:
  group: agent-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  writer:
    runs-on: ubuntu-latest
    # workflow_run 트리거 시 fetch-data 가 성공한 경우만 실행 (실패·취소 시 skip)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      # PR 생성과 브랜치 푸시를 위해 권한 필요
      contents: write
      pull-requests: write
    steps:
      # 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 환경 설정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치
      - name: Install deps
        run: npm ci

      # Pulse Writer 스텁 실행 — M1+에서 실제 MDX 초안 생성으로 대체
      - name: Run Pulse Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/writer.mjs

      # 생성된 초안을 PR로 자동 제출
      - name: Open draft PR
        uses: peter-evans/create-pull-request@v6
        with:
          # 새 브랜치 — run id로 충돌 회피
          branch: drafts/${{ github.run_id }}
          base: main
          commit-message: 'feat(draft): pulse writer 자동 초안 ${{ github.run_id }}'
          title: '[draft] Pulse Writer 자동 초안 #${{ github.run_id }}'
          body: |
            Pulse Writer 에이전트가 자동 생성한 초안입니다.

            - 트리거 커밋: ${{ github.sha }}
            - 워크플로우 런: ${{ github.run_id }}

            데스크 리뷰어(#5)의 자동 코멘트를 확인한 뒤 사람이 최종 머지하세요.
          # 자동 라벨 — peter-evans/create-pull-request@v6 은 labels 입력으로 라벨을 지원
          labels: |
            ai-draft
            agent:pulse-writer
          delete-branch: true
