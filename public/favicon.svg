<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="스마트데이터샵">
  <!-- 와인 배경 + 페이퍼 'S' — 16x16 favicon 에서도 또렷하게 가독.
       브랜드 컬러: 와인 #8b1538 (accent), 페이퍼 #faf7f0 (배경 톤) -->
  <rect width="64" height="64" rx="10" ry="10" fill="#8b1538"/>
  <!-- 페이퍼 톤 'S' — Noto Serif 가 없으면 Times New Roman fallback -->
  <text
    x="32"
    y="48"
    font-family="'Noto Serif KR','Noto Serif','Times New Roman',serif"
    font-size="50"
    font-weight="700"
    fill="#faf7f0"
    text-anchor="middle"
    letter-spacing="-2"
  >S</text>
</svg>
