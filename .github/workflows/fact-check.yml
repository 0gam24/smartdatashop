# 에이전트 #6 — Fact-Checker (Layer 4 사후 감사, ADR 0005)
# 02:00 KST 매일 (= 17:00 UTC 전날) 14일 윈도우 글 감사
# 모드: FACT_CHECKER_MODE = lite (기본 매일 cron) / full (workflow_dispatch)
name: agent-fact-check

on:
  schedule:
    # LITE 매일 — KST 02:00 = UTC 17:00 (전날)
    - cron: '0 17 * * *'
    # FULL 주 1회 일요일 — KST 04:00 = UTC 19:00 (토요일)
    # 비용 가드: high-risk 우선 + MAX_AUDITS=5 (주당 약 $0.25-0.50)
    - cron: '0 19 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: 'fact-check 모드 (lite / full)'
        required: false
        default: 'lite'
        type: choice
        options:
          - lite
          - full
      max_audits:
        description: 'FULL 모드 최대 감사 건수 (1-20)'
        required: false
        default: '5'

# 동시 실행 방지
concurrency:
  group: agent-fact-check
  cancel-in-progress: false

jobs:
  fact-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # 모드 결정:
      #   workflow_dispatch → inputs.mode
      #   cron '0 19 * * 6' (토 19:00 UTC = 일 04:00 KST) → 'full'
      #   cron '0 17 * * *' (매일 17:00 UTC = 02:00 KST) → 'lite'
      - name: Run Fact-Checker (Layer 4)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FACT_CHECKER_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 19 * * 6' && 'full' || 'lite') }}
          FACT_CHECKER_MAX_AUDITS: ${{ github.event.inputs.max_audits || '5' }}
        run: node scripts/agents/fact-checker.mjs

      # fact-check-queue/ 변경분 자동 커밋
      - name: Commit fact-check results if changed
        run: |
          git config user.name "fact-checker-bot"
          git config user.email "fact-checker-bot@users.noreply.github.com"
          git add fact-check-queue/
          if ! git diff --cached --quiet; then
            git commit -m "chore(fact-check): ${FACT_CHECKER_MODE:-lite} audit $(date -u +%F)"
            git push
          else
            echo "No fact-check changes to commit."
          fi
        env:
          FACT_CHECKER_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 19 * * 6' && 'full' || 'lite') }}
