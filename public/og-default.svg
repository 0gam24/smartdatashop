<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Paper background (한지 톤) -->
  <rect width="1200" height="630" fill="#faf7f0"/>

  <!-- Top hairline -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#e0ddd0" stroke-width="0.5"/>

  <!-- Top-left small caps issue marker -->
  <text x="80" y="68"
        font-family="'Pretendard', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="500"
        letter-spacing="2.5"
        fill="#6b6b6b">DATA JOURNAL</text>

  <!-- Top-right volume marker, wine accent -->
  <text x="1120" y="68"
        text-anchor="end"
        font-family="'JetBrains Mono', 'Menlo', 'Consolas', monospace"
        font-size="13" font-weight="500"
        letter-spacing="2.5"
        fill="#8b1538">VOL I &#183; NO 89</text>

  <!-- Headline: 스마트데이터샵 (serif, large, ink) -->
  <text x="80" y="320"
        font-family="'Noto Serif KR', 'Noto Serif', 'Source Han Serif KR', serif"
        font-size="84" font-weight="600"
        letter-spacing="-1"
        fill="#1a1a1a">스마트데이터샵</text>

  <!-- Wine .kr suffix, smaller, tucked closer to wordmark -->
  <text x="690" y="320"
        font-family="'Noto Serif KR', 'Noto Serif', 'Source Han Serif KR', serif"
        font-size="36" font-weight="400"
        fill="#8b1538">.kr</text>

  <!-- Italic serif tagline -->
  <text x="80" y="392"
        font-family="'Noto Serif KR', 'Noto Serif', 'Source Han Serif KR', serif"
        font-size="30" font-style="italic" font-weight="400"
        fill="#6b6b6b">한국의 데이터를 매일 5분으로</text>

  <!-- Bottom hairline -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#e0ddd0" stroke-width="0.5"/>

  <!-- Bottom small caps -->
  <text x="80" y="568"
        font-family="'Pretendard', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500"
        letter-spacing="2"
        fill="#6b6b6b">1차 출처 데이터 저널</text>

  <!-- Bottom right URL -->
  <text x="1120" y="568"
        text-anchor="end"
        font-family="'JetBrains Mono', 'Menlo', 'Consolas', monospace"
        font-size="14" font-weight="500"
        letter-spacing="1.5"
        fill="#6b6b6b">smartdatashop.kr</text>
</svg>
