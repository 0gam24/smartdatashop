name: fetch-data

# 매일 새벽 ECOS 100대 지표 + 정부 RSS 14피드 자동 갱신.
# Cron + 수동 trigger (workflow_dispatch) 둘 다 지원.
#
# Secrets:
#   ECOS_API_KEY — Repository → Settings → Secrets and variables → Actions
#                  미설정 시 ECOS 단계만 실패, RSS 는 성공 (continue-on-error)

on:
  schedule:
    # 매일 00:30 KST (= UTC 15:30) — sister sync(02:00 KST) 와 겹치지 않게 30분 일찍
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (no deps required - native fetch + regex parser)
        run: echo "Native fetch only — no npm install needed"

      - name: Fetch ECOS 100대 지표
        id: fetch-ecos
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -z "$ECOS_API_KEY" ]; then
            echo "::warning::ECOS_API_KEY secret 미설정 — 본 단계 스킵"
            exit 0
          fi
          node scripts/fetch-ecos-key100.mjs
        continue-on-error: true

      - name: Fetch ECOS 시계열 (기준금리·환율·CPI)
        id: fetch-ecos-ts
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -z "$ECOS_API_KEY" ]; then
            echo "::warning::ECOS_API_KEY secret 미설정 — 본 단계 스킵"
            exit 0
          fi
          node scripts/fetch-ecos-timeseries.mjs
        continue-on-error: true

      - name: Fetch KOSIS 100대 지표 (지표정보 조회)
        id: fetch-kosis-indicator
        env:
          KOSIS_INDICATOR_KEY: ${{ secrets.KOSIS_INDICATOR_KEY }}
          NODE_ENV: production
        run: |
          if [ -z "$KOSIS_INDICATOR_KEY" ]; then
            echo "::warning::KOSIS_INDICATOR_KEY secret 미설정 — 본 단계 스킵"
            exit 0
          fi
          node scripts/fetch-kosis-indicator.mjs
        continue-on-error: true

      - name: Fetch 정부 RSS 14피드 (66 sources)
        id: fetch-rss
        env:
          NODE_ENV: production
        run: node scripts/fetch-rss-government.mjs
        continue-on-error: true

      - name: Fetch 뉴스 키워드 트렌드 (7 언론사)
        id: fetch-news
        env:
          NODE_ENV: production
        run: node scripts/fetch-news-keywords.mjs
        continue-on-error: true

      - name: Generate 펄스 초안 (RSS 1차 출처 기반 / 운영자 검수용)
        # Phase 9 — 발행 펌프 가속: 한 실행에서 4건 생성 (이전 1건 → 4건).
        # 검수 통과율 40% 목표 시 = 1.6건/일 발행 → news-sitemap 48h 윈도우 유지.
        id: draft-pulse
        env:
          NODE_ENV: production
        run: node scripts/draft-pulse-from-rss.mjs --count 4
        continue-on-error: true

      - name: Commit + push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/economy/ data/rss/ data/news/ daily-queue/drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — skip commit"
          else
            ECOS_STATUS="${{ steps.fetch-ecos.outcome }}"
            KOSIS_I_STATUS="${{ steps.fetch-kosis-indicator.outcome }}"
            RSS_STATUS="${{ steps.fetch-rss.outcome }}"
            git commit -m "chore(data): 자동 갱신 $(date -u +%Y-%m-%dT%H:%M:%SZ) [ecos=$ECOS_STATUS kosis=$KOSIS_I_STATUS rss=$RSS_STATUS] [skip ci]"
            git push
            echo "Committed + pushed."
          fi

      - name: Report aggregate status
        if: always()
        run: |
          echo "ECOS fetch:           ${{ steps.fetch-ecos.outcome }}"
          echo "KOSIS indicator fetch:${{ steps.fetch-kosis-indicator.outcome }}"
          echo "RSS fetch:            ${{ steps.fetch-rss.outcome }}"
          if [ "${{ steps.fetch-ecos.outcome }}" = "failure" ] && [ "${{ steps.fetch-rss.outcome }}" = "failure" ] && [ "${{ steps.fetch-kosis-indicator.outcome }}" = "failure" ]; then
            echo "::error::All 3 fetch steps failed — investigate"
            exit 1
          fi
