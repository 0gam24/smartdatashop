# 에이전트 #3 — Pulse Writer
# Editor-in-Chief가 daily-queue/ 에 신규 큐를 푸시하면 트리거되어 초안 MDX 생성 → PR
name: agent-writer

on:
  # 수동 전용 (2026-06-12 운영자 지시 — 포스팅은 매일 "오늘 포스팅" 수동 발행만).
  #
  # 이전의 workflow_run(fetch-data 후속)·push(daily-queue/**)·백업 cron 트리거는
  # 모두 제거 — WRITER_AUTO_PUBLISH=false(2026-05-17) 이후 매일 자동 실행이
  # verify:strict 링크 체커의 CI 러너 .go.kr timeout 으로 실패만 반복하며
  # 빨간 실행·텔레그램 경보 소음을 만들었다. 자동 발행 재개 결정 시
  # 트리거 복원은 별도 PR + 운영자 명시 승인으로만.
  workflow_dispatch:

concurrency:
  group: agent-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  writer:
    runs-on: ubuntu-latest
    permissions:
      # PR 생성과 브랜치 푸시를 위해 권한 필요
      contents: write
      pull-requests: write
    steps:
      # 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 환경 설정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치
      - name: Install deps
        run: npm ci

      # Pulse Writer (M1+) — 본문 생성 + fact-check + 자동 발행
      - name: Run Pulse Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # AUTO_PUBLISH 비활성화 (2026-05-17 운영자 승인) — 4 버그 확인 후 안전 보강:
          #   A) Telegram "발행 완료" 가짜 신호 (verify:strict 실패 시 workspace 폐기, PR 미생성)
          #   B) Sonnet 4.6 fact-check 비결정성 (같은 draft 3 run, ok/fabricated/ok)
          #   C) 환각 caught 후 격리 없음 — 다음 run 재처리
          #   D) verify:strict 미페어링 58 → strict exit 1 → 모든 auto-publish PR 차단
          # 흐름: writer 가 본문만 enhance, drafts/ 그대로 유지 → 운영자 직접 검수·발행.
          WRITER_AUTO_PUBLISH: 'false'
          WRITER_FACT_CHECK_MODEL: 'claude-sonnet-4-6'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/agents/writer.mjs

      # 빌드 검증 — auto-merge 전 schema·sync gate 통과 확인
      - name: Verify build (Zod schema + sync gate)
        run: npm run build

      # ADR 0006 4기준 검증 — 출처 페어링·deep link·기관 발표 일자·검증 불가 격리
      # verify:strict 는 build chain 외부 — 명시적 step 으로 호출 (P0 보고 §3)
      # fail-loud → PR 생성·머지 전부 차단 (CLAUDE.md §정식 발행 4대 기준)
      - name: Verify strict (ADR 0006 4기준)
        run: npm run verify:strict

      # PR 자동 생성 (drafts/ 변경 + src/content/pulse/ 추가 포함)
      - name: Open auto-published PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-publish/${{ github.run_id }}
          base: main
          commit-message: 'feat(pulse): writer 자동 발행 ${{ github.run_id }}'
          title: '[auto] Pulse Writer 자동 발행 #${{ github.run_id }}'
          body: |
            Pulse Writer (M1) + Fact-Check (Sonnet 4.6) 자동 발행.

            - 본문 생성: Haiku 4.5
            - 환각 점검: Sonnet 4.6 + 1차 출처 fetch
            - 통과: src/content/pulse/ 이동 + auto-merge
            - 실패: drafts/ 유지 + 텔레그램 알림

            트리거: ${{ github.run_id }}
          labels: |
            ai-draft
            agent:pulse-writer
            auto-publish
          delete-branch: true

      # PR auto-merge — 빌드 통과 후 자동 머지 (운영자 사후 검수)
      - name: Auto-merge published PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --merge --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
