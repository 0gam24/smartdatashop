## Lighthouse CI quality gate
##
## Runs Lighthouse against the production smartdatashop.kr URLs:
##   - PR to main:        validates the PR's effect on perf/a11y/SEO/best-practices
##                        (Cloudflare Pages builds preview deploys per PR; we still
##                         run against the canonical prod domain because the budget
##                         is what we ship — preview URL fluctuation isn't useful)
##   - push to main:      post-deploy validation that the production deploy still
##                        meets the budget
##   - workflow_dispatch: ad-hoc runs from the Actions UI
##
## Wait strategy: Cloudflare Pages typically completes a build in ~60s.
## We sleep 90s before running Lighthouse so the deploy has propagated.
## (For PRs, this gates against prod URLs not preview — see README of this file
##  block. Switching to preview URLs requires a Cloudflare API token and is
##  intentionally deferred.)
##
## Budgets:
##   - lighthouserc.json (desktop: perf ≥ 0.90, a11y ≥ 0.95, BP ≥ 0.95, SEO ≥ 0.95).
##   - lighthouserc.mobile.json (mobile: perf ≥ 0.85, a11y ≥ 0.95, BP ≥ 0.95, SEO ≥ 0.95).
##   Discover 는 모바일 우선 — 두 프리셋 모두 통과해야 ship 가능. (G21)
name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cloudflare Pages 가 main push / PR commit 후 빌드를 끝낼 때까지 대기.
      # 내부 빌드는 보통 60s 안팎이라 90s 면 안전 마진.
      - name: Wait for Cloudflare Pages deploy
        run: sleep 90

      - name: Run Lighthouse CI (desktop)
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://smartdatashop.kr/
            https://smartdatashop.kr/2026/05/05/2026-05-05-jongseong-server/
            https://smartdatashop.kr/insight/
            https://smartdatashop.kr/about/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
          runs: 1

      # Discover 는 모바일 우선 — 데스크톱 점수가 좋아도 모바일이 무너지면 노출 0.
      # G21 픽스: 같은 4 URL 을 모바일 프리셋(throttling 4× CPU + slow 3G) 으로 재측정.
      - name: Run Lighthouse CI (mobile)
        id: lhci_mobile
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://smartdatashop.kr/
            https://smartdatashop.kr/2026/05/05/2026-05-05-jongseong-server/
            https://smartdatashop.kr/insight/
            https://smartdatashop.kr/about/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.mobile.json
          runs: 1
          artifactName: lhci-mobile

      # PR 코멘트로 점수 표 게시.
      # treosh action 은 manifest.json 을 .lighthouseci/ 디렉토리에 남긴다.
      # 거기서 카테고리 점수만 추출해 마크다운 표로 변환한다.
      - name: Post Lighthouse scores as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '.lighthouseci';
            if (!fs.existsSync(dir)) {
              core.warning('No .lighthouseci directory; skipping comment');
              return;
            }
            const manifestPath = path.join(dir, 'manifest.json');
            if (!fs.existsSync(manifestPath)) {
              core.warning('No manifest.json; skipping comment');
              return;
            }
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const rows = manifest
              .filter((m) => m.isRepresentativeRun)
              .map((m) => {
                const summary = m.summary || {};
                const url = m.url;
                const fmt = (n) => (n == null ? '—' : Math.round(n * 100));
                return `| ${url} | ${fmt(summary.performance)} | ${fmt(summary.accessibility)} | ${fmt(summary['best-practices'])} | ${fmt(summary.seo)} |`;
              })
              .join('\n');
            const body = [
              '### Lighthouse CI report',
              '',
              '| URL | Perf | A11y | BP | SEO |',
              '| --- | ---: | ---: | ---: | ---: |',
              rows,
              '',
              `Budgets: Perf ≥ 90 · A11y ≥ 95 · BP ≥ 95 · SEO ≥ 95`,
              `Run: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
