# 에이전트 #3 — Pulse Writer
# Editor-in-Chief가 daily-queue/ 에 신규 큐를 푸시하면 트리거되어 초안 MDX 생성 → PR
name: agent-writer

on:
  # 다중 안전망 — GitHub cron 부정확성·skip 위험 대응:
  #
  # 1. workflow_run — fetch-data 완료 후 자동 가동 (가장 안정).
  #    GITHUB_TOKEN 한계 회피: workflow_run 은 같은 repo workflow 의 완료 이벤트를
  #    수신할 수 있어 fetch-data → writer 체이닝이 보안 정책 우회 가능.
  workflow_run:
    workflows: ['fetch-data']
    types: [completed]
  # 2. push 트리거 — 운영자 직접 push 케이스 (PR 머지 시 daily-queue/** 변경 시).
  push:
    paths:
      - 'daily-queue/**'
  # 3. 백업 cron — workflow_run 누락 대비 1일 2회 (03:45 + 09:00 KST).
  schedule:
    - cron: '45 18 * * *'  # KST 03:45 (fetch-data 02:17 후 1.5h)
    - cron: '0 0 * * *'    # KST 09:00 (운영자 아침 점검 직전)
  # 4. 수동 — workflow_dispatch
  workflow_dispatch:

concurrency:
  group: agent-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  writer:
    runs-on: ubuntu-latest
    # workflow_run 트리거 시 fetch-data 가 성공한 경우만 실행 (실패·취소 시 skip)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      # PR 생성과 브랜치 푸시를 위해 권한 필요
      contents: write
      pull-requests: write
    steps:
      # 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 환경 설정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치
      - name: Install deps
        run: npm ci

      # Pulse Writer (M1+) — 본문 생성 + fact-check + 자동 발행
      - name: Run Pulse Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # AUTO_PUBLISH 재가동 (2026-05-17 stabilization PR) — 4 버그 모두 수정 후 ON 복귀:
          #   A) Telegram "발행 완료" → workflow PR auto-merge 성공 step 으로 이전 (가짜 신호 차단)
          #   B) fact-check temperature: 0 + body temperature: 0.3 — 결정성 + 환각 감소
          #   C) 환각 caught 시 daily-queue/quarantine/ 으로 격리 (재처리 차단)
          #   D) extract-numerical-claims --strict 임계 0 → 70 완화 (58건 통과, P3 정리)
          # AdSense 매일 발행 흐름 복구 — 환각 위험은 4 버그 fix 로 차단.
          WRITER_AUTO_PUBLISH: 'true'
          WRITER_FACT_CHECK_MODEL: 'claude-sonnet-4-6'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/agents/writer.mjs

      # 빌드 검증 — auto-merge 전 schema·sync gate 통과 확인
      - name: Verify build (Zod schema + sync gate)
        run: npm run build

      # ADR 0006 4기준 검증 — 출처 페어링·deep link·기관 발표 일자·검증 불가 격리
      # verify:strict 는 build chain 외부 — 명시적 step 으로 호출 (P0 보고 §3)
      # fail-loud → PR 생성·머지 전부 차단 (CLAUDE.md §정식 발행 4대 기준)
      - name: Verify strict (ADR 0006 4기준)
        run: npm run verify:strict

      # PR 자동 생성 (drafts/ 변경 + src/content/pulse/ 추가 포함)
      - name: Open auto-published PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-publish/${{ github.run_id }}
          base: main
          commit-message: 'feat(pulse): writer 자동 발행 ${{ github.run_id }}'
          title: '[auto] Pulse Writer 자동 발행 #${{ github.run_id }}'
          body: |
            Pulse Writer (M1) + Fact-Check (Sonnet 4.6) 자동 발행.

            - 본문 생성: Haiku 4.5
            - 환각 점검: Sonnet 4.6 + 1차 출처 fetch
            - 통과: src/content/pulse/ 이동 + auto-merge
            - 실패: drafts/ 유지 + 텔레그램 알림

            트리거: ${{ github.run_id }}
          labels: |
            ai-draft
            agent:pulse-writer
            auto-publish
          delete-branch: true

      # PR auto-merge — 빌드 통과 후 자동 머지 (운영자 사후 검수)
      - name: Auto-merge published PR
        id: merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --merge --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      # Bug A fix — Telegram "자동 발행 완료" 는 여기서만 발송 (PR 머지 실제 성공 후).
      # writer.mjs 는 tmp/writer-publish-marker.json 만 작성 → 본 step 이 marker 읽고 알림.
      # verify:strict / build / PR 어느 단계든 실패하면 본 step 도 안 돌아 → 가짜 신호 차단.
      - name: Notify Telegram on actual publish
        if: success() && steps.merge.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: node scripts/agents/notify-publish-success.mjs
