# 에이전트 #6 — Publisher
# 머지 후 main 브랜치의 콘텐츠 변경 시 색인/뉴스레터 등 외부 채널 푸시
name: agent-publisher

on:
  push:
    branches:
      - main
    paths:
      # pulse / insight 콘텐츠 변경 시에만 발행 트리거
      - 'src/content/pulse/**'
      - 'src/content/insight/**'
  # 수동 실행 트리거
  workflow_dispatch:

concurrency:
  group: agent-publisher
  cancel-in-progress: false

jobs:
  publisher:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 환경 설정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치
      - name: Install deps
        run: npm ci

      # Publisher 실행 (Phase 12, ADR 0005):
      #   - IndexNow: 무료/키 불필요 — `PUBLISHER_LIVE_INDEXNOW=true` 로 즉시 활성
      #     (안전한 기본값은 stub. vars 에서 활성 토글)
      #   - Google Indexing API / Naver SA / Stibee: M1+ stub
      - name: Run Publisher
        env:
          # IndexNow 활성 토글 — Repository Variables 에 PUBLISHER_LIVE_INDEXNOW=true 설정
          PUBLISHER_LIVE_INDEXNOW: ${{ vars.PUBLISHER_LIVE_INDEXNOW }}
          # Google Indexing API 서비스 계정 키 (JSON, M1+)
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
          # 네이버 검색광고 / 서치어드바이저 키 (M1+)
          NAVER_SA_KEY: ${{ secrets.NAVER_SA_KEY }}
          # Stibee 뉴스레터 발송 API 키 (M1+)
          STIBEE_API_KEY: ${{ secrets.STIBEE_API_KEY }}
        run: node scripts/agents/publisher.mjs
