# 에이전트 #5 — Desk Reviewer
# src/content/** 가 포함된 PR이 열리거나 갱신될 때마다 자동 리뷰
name: agent-desk-review

on:
  pull_request:
    paths:
      - 'src/content/**'
    types: [opened, synchronize, reopened]
  # 수동 실행 트리거
  workflow_dispatch:

concurrency:
  group: agent-desk-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desk-review:
    runs-on: ubuntu-latest
    permissions:
      # PR 코멘트 작성 권한
      pull-requests: write
      contents: read
    steps:
      # 저장소 체크아웃 — PR 헤드 커밋 대상
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 환경 설정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 의존성 설치
      - name: Install deps
        run: npm ci

      # Desk Reviewer 스텁 실행 — tmp/review-report.json 생성
      - name: Run Desk Reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agents/desk-reviewer.mjs

      # 생성된 리뷰 리포트를 PR 코멘트로 게시
      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'tmp/review-report.json';
            // 리뷰 리포트가 없으면 스킵 (스텁 단계 안전장치)
            if (!fs.existsSync(path)) {
              core.info('리뷰 리포트가 존재하지 않아 코멘트를 생략합니다.');
              return;
            }
            const raw = fs.readFileSync(path, 'utf8');
            let report;
            try {
              report = JSON.parse(raw);
            } catch (e) {
              core.setFailed(`review-report.json 파싱 실패: ${e.message}`);
              return;
            }
            const summary = report.summary || '(요약 없음)';
            const issues = Array.isArray(report.issues) ? report.issues : [];
            const body = [
              '## 자동 데스크 리뷰 (#5)',
              '',
              `**요약**: ${summary}`,
              '',
              issues.length
                ? '### 지적사항\n' + issues.map((i, n) => `${n + 1}. ${i}`).join('\n')
                : '_지적사항 없음_',
              '',
              '_본 코멘트는 desk-reviewer 스텁이 생성했습니다. M1+에서 실제 Claude 리뷰로 대체됩니다._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
