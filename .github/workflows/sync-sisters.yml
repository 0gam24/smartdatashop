name: sync-sister-mirrors

on:
  # ADR 0010 — 단일 독립 운영. 자매 mirror 동기화 폐기 (2026-05-31, AdSense reject 대응).
  # 동기화 데이터가 사이트 어디에도 렌더되지 않음. schedule 제거, 수동 실행만 유지(복구 가능).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (no deps required - native fetch)
        run: echo "Native fetch — no install needed"

      - name: Run sister mirror sync
        run: node scripts/sync-sister-mirrors.mjs
        env:
          NODE_ENV: production

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sister-mirrors/ data/network-index.json
          if git diff --cached --quiet; then
            echo "No mirror changes — sisters up to date"
          else
            git commit -m "chore(network): sister mirrors sync $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
