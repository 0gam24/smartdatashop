<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="스마트데이터샵">
  <!-- Paper background with subtle rounded corners -->
  <rect width="64" height="64" rx="10" ry="10" fill="#faf7f0"/>
  <!-- Wine accent dot mark — sits like a printer's bullet -->
  <circle cx="14" cy="32" r="4" fill="#8b1538"/>
  <!-- SDS monogram in serif ink -->
  <text
    x="22"
    y="42"
    font-family="'Noto Serif KR','Noto Serif','Times New Roman',serif"
    font-size="28"
    font-weight="600"
    fill="#1a1a1a"
    letter-spacing="-1"
  >SDS</text>
</svg>
